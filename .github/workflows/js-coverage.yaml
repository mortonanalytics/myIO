on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: js-coverage

permissions: read-all

jobs:
  js-coverage:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run JS tests with coverage
        run: npm run test:coverage

      - name: Generate JS coverage badge
        if: github.event_name == 'push'
        run: |
          PCT=$(node -e "const s = require('./coverage/coverage-summary.json'); console.log(s.total.lines.pct)")
          if [ "$(echo "$PCT >= 90" | bc)" -eq 1 ]; then
            COLOR="brightgreen"
          elif [ "$(echo "$PCT >= 75" | bc)" -eq 1 ]; then
            COLOR="green"
          elif [ "$(echo "$PCT >= 60" | bc)" -eq 1 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          curl -s -o man/figures/js-coverage-badge.svg \
            "https://img.shields.io/badge/JS_coverage-${PCT}%25-${COLOR}"

      - name: Commit badge
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add man/figures/js-coverage-badge.svg
          git diff --staged --quiet || git commit -m "Update JS coverage badge [skip ci]"
          git push
