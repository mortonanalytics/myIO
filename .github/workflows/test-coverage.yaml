# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          pct <- round(covr::percent_coverage(cov), 1)
          writeLines(as.character(pct), "coverage-pct.txt")
        shell: Rscript {0}

      - name: Generate coverage badge
        if: github.event_name == 'push'
        run: |
          PCT=$(cat coverage-pct.txt)
          # Choose color based on coverage percentage
          if [ "$(echo "$PCT >= 90" | bc)" -eq 1 ]; then
            COLOR="brightgreen"
          elif [ "$(echo "$PCT >= 75" | bc)" -eq 1 ]; then
            COLOR="green"
          elif [ "$(echo "$PCT >= 60" | bc)" -eq 1 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          curl -s -o man/figures/coverage-badge.svg \
            "https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}"

      - name: Commit badge
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add man/figures/coverage-badge.svg
          git diff --staged --quiet || git commit -m "Update coverage badge [skip ci]"
          git pull --rebase
          git push
